# Managed SWE Team Terrarium
# A root agent orchestrates a SWE team through natural language.
# The user talks to the root agent, which delegates to swe + reviewer.
#
# Topology:
#   user -> root (orchestrates) -> tasks -> swe -> review -> reviewer
#   root monitors results and reports back to user
#
# Usage:
#   python -m kohakuterrarium terrarium run terrariums/swe_team_managed/

terrarium:
  name: swe_team_managed

  creatures:
    - name: root
      config: ../../creatures/root
      channels:
        listen: [user_input, results, team_chat]
        can_send: [tasks, team_chat]

    - name: swe
      config: ../../creatures/swe
      channels:
        listen: [tasks, feedback, team_chat]
        can_send: [review, team_chat]

    - name: reviewer
      config: ../../creatures/reviewer
      channels:
        listen: [review, team_chat]
        can_send: [feedback, results, team_chat]

  channels:
    user_input: { type: queue, description: "User requests to the root agent" }
    tasks:      { type: queue, description: "Task assignments from root to developers" }
    review:     { type: queue, description: "Code changes submitted for review" }
    feedback:   { type: queue, description: "Review feedback back to developer" }
    results:    { type: queue, description: "Final approved results" }
    team_chat:  { type: broadcast, description: "Team coordination and status" }

  interface:
    type: cli
    observe: [tasks, review, feedback, results, team_chat]
    inject_to: [user_input]
