# SWE Team Terrarium
# A software engineering team with task assignment, implementation, and review.
#
# Topology:
#   tasks -> swe (implements) -> review -> reviewer (reviews)
#   reviewer sends feedback or approval back
#   team_chat broadcast for coordination
#
# Usage:
#   python -m kohakuterrarium terrarium run terrariums/swe_team/
#   python -m kohakuterrarium terrarium run terrariums/swe_team/ --seed "Fix the auth bug in src/auth/"

terrarium:
  name: swe_team

  creatures:
    - name: swe
      config: ../../creatures/swe
      channels:
        listen: [tasks, feedback, team_chat]
        can_send: [review, team_chat]

    - name: reviewer
      config: ../../creatures/reviewer
      channels:
        listen: [review, team_chat]
        can_send: [feedback, results, team_chat]

  channels:
    tasks:      { type: queue, description: "Incoming task assignments" }
    review:     { type: queue, description: "Code changes submitted for review" }
    feedback:   { type: queue, description: "Review feedback back to developer" }
    results:    { type: queue, description: "Final approved results" }
    team_chat:  { type: broadcast, description: "Team coordination and status updates" }

  interface:
    type: cli
    observe: [tasks, review, feedback, results, team_chat]
    inject_to: [tasks]
